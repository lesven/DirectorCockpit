services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
            - '../src/Domain/Model/'
            - '../src/Domain/Exception/'
            - '../src/Application/Command/'

when@test:
    services:
        # Suppress HTTP exception noise (401, 403) in test output.
        # The kernel uses Symfony\Component\HttpKernel\Log\Logger (stderr) by default.
        # Replacing it with NullLogger prevents expected security exceptions from polluting PHPUnit output.
        logger:
            class: Psr\Log\NullLogger
