services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
            - '../src/Domain/Model/'
            - '../src/Domain/Event/'
            - '../src/Domain/Exception/'
            - '../src/Application/Command/'
