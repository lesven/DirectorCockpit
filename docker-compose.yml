services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cockpit:cockpit@db:5432/cockpit?serverVersion=15

  web:
    image: nginx:1-alpine
    ports:
      - "8089:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
    depends_on:
      - app

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: cockpit
      POSTGRES_PASSWORD: cockpit
      POSTGRES_DB: cockpit
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cockpit"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  db-data:
