<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Director's Cockpit – Anmelden</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="cockpit.css">
<style>
  .login-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 60px);
  }
  .login-card {
    background: var(--bg-card, #1e2a3a);
    border: 1px solid var(--border, #2d3f55);
    border-radius: 10px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 380px;
  }
  .login-card h2 {
    margin: 0 0 1.5rem;
    font-size: 1.2rem;
    font-weight: 500;
    color: var(--text-primary, #e2e8f0);
  }
  .login-field {
    margin-bottom: 1.2rem;
  }
  .login-field label {
    display: block;
    font-size: 0.8rem;
    color: var(--text-secondary, #94a3b8);
    margin-bottom: 0.35rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .login-field input {
    width: 100%;
    box-sizing: border-box;
    background: var(--bg-input, #0f1923);
    border: 1px solid var(--border, #2d3f55);
    border-radius: 6px;
    color: var(--text-primary, #e2e8f0);
    font-family: inherit;
    font-size: 0.95rem;
    padding: 0.55rem 0.75rem;
    outline: none;
    transition: border-color 0.15s;
  }
  .login-field input:focus {
    border-color: var(--accent, #3b82f6);
  }
  .login-btn {
    width: 100%;
    margin-top: 0.5rem;
    padding: 0.6rem;
    background: var(--accent, #3b82f6);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .login-btn:hover { background: #2563eb; }
  .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .login-error {
    margin-top: 1rem;
    padding: 0.6rem 0.8rem;
    background: rgba(239, 68, 68, 0.15);
    border: 1px solid rgba(239, 68, 68, 0.4);
    border-radius: 6px;
    color: #fca5a5;
    font-size: 0.85rem;
    display: none;
  }
  .login-error.visible { display: block; }
</style>
</head>
<body>

<header>
  <h1>Director's Cockpit</h1>
</header>

<div class="login-wrapper">
  <div class="login-card">
    <h2>Anmelden</h2>
    <form id="login-form" novalidate>
      <div class="login-field">
        <label for="email">E-Mail</label>
        <input type="email" id="email" name="email" autocomplete="email" required autofocus>
      </div>
      <div class="login-field">
        <label for="password">Passwort</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="login-btn" id="login-btn">Anmelden</button>
      <div class="login-error" id="login-error" role="alert"></div>
    </form>
  </div>
</div>

<script type="module" src="js/login.js"></script>
</body>
</html>
