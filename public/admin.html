<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Director's Cockpit – Benutzerverwaltung</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="cockpit.css">
<style>
  .admin-main { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
  .admin-toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
  .admin-toolbar h2 { margin: 0; font-size: 1rem; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; }
  .admin-table { width: 100%; border-collapse: collapse; }
  .admin-table th { text-align: left; font-size: 0.75rem; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; padding: 6px 12px; border-bottom: 1px solid var(--border); }
  .admin-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); color: var(--text1, #e2e8f0); font-size: 0.875rem; }
  .admin-table tr:hover td { background: rgba(255,255,255,.03); }
  .role-badge { display: inline-block; font-size: 0.7rem; padding: 2px 7px; border-radius: 3px; background: rgba(59,130,246,.18); color: #93c5fd; margin-right: 4px; }
  .role-badge.admin { background: rgba(245,158,11,.18); color: #fcd34d; }
  .admin-table select { background: var(--bg-input, #0f1923); border: 1px solid var(--border); color: var(--text1, #e2e8f0); border-radius: 4px; padding: 3px 6px; font-family: inherit; font-size: 0.8rem; }
  .btn-danger { background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.4); color: #fca5a5; padding: 3px 10px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 0.8rem; }
  .btn-danger:hover { background: rgba(239,68,68,.3); }
  .btn-primary { background: var(--accent, #3b82f6); border: none; color: #fff; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 0.875rem; font-weight: 500; }
  .btn-primary:hover { background: #2563eb; }
  .admin-error { padding: .5rem .8rem; background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.4); border-radius: 6px; color: #fca5a5; font-size: .85rem; margin-bottom: 1rem; display: none; }
  .admin-error.visible { display: block; }
  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal-box { background: var(--bg-card, #1e2a3a); border: 1px solid var(--border); border-radius: 10px; padding: 2rem; width: 100%; max-width: 380px; }
  .modal-box h3 { margin: 0 0 1.2rem; font-size: 1rem; }
  .modal-field { margin-bottom: 1rem; }
  .modal-field label { display: block; font-size: .75rem; color: var(--text2); margin-bottom: .3rem; text-transform: uppercase; letter-spacing: .04em; }
  .modal-field input, .modal-field select { width: 100%; box-sizing: border-box; background: var(--bg-input, #0f1923); border: 1px solid var(--border); border-radius: 6px; color: var(--text1, #e2e8f0); font-family: inherit; font-size: .9rem; padding: .45rem .7rem; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.2rem; }
  .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text2); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-family: inherit; }
</style>
</head>
<body>

<header>
  <h1>Director's Cockpit</h1>
  <a href="/cockpit.html" class="header-link">← Cockpit</a>
  <nav class="user-info" id="user-info" aria-label="Benutzermenü"></nav>
</header>

<main class="admin-main">
  <div class="admin-toolbar">
    <h2>Benutzerverwaltung</h2>
    <button class="btn-primary" id="add-user-btn">+ Benutzer anlegen</button>
  </div>
  <div class="admin-error" id="admin-error" role="alert"></div>
  <table class="admin-table" id="user-table">
    <thead>
      <tr>
        <th>E-Mail</th>
        <th>Rollen</th>
        <th>Rolle ändern</th>
        <th>Erstellt</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="user-tbody"></tbody>
  </table>
</main>

<!-- Neuer Benutzer Modal -->
<div class="modal-overlay" id="create-modal">
  <div class="modal-box">
    <h3>Neuen Benutzer anlegen</h3>
    <div class="modal-field">
      <label for="new-email">E-Mail</label>
      <input type="email" id="new-email" autocomplete="off">
    </div>
    <div class="modal-field">
      <label for="new-password">Passwort</label>
      <input type="password" id="new-password" autocomplete="new-password">
    </div>
    <div class="modal-field">
      <label for="new-role">Rolle</label>
      <select id="new-role">
        <option value="ROLE_USER">User</option>
        <option value="ROLE_ADMIN">Admin</option>
      </select>
    </div>
    <div class="admin-error" id="create-error" role="alert"></div>
    <div class="modal-actions">
      <button class="btn-secondary" id="create-cancel">Abbrechen</button>
      <button class="btn-primary" id="create-submit">Anlegen</button>
    </div>
  </div>
</div>

<script type="module" src="js/admin.js"></script>
</body>
</html>
