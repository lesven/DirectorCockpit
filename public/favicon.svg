<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1a2b4a"/>
  <!-- Outer ring (steering wheel rim) -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#f0c040" stroke-width="2.5"/>
  <!-- Center hub -->
  <circle cx="16" cy="16" r="3" fill="#f0c040"/>
  <!-- Top spoke -->
  <line x1="16" y1="13" x2="16" y2="4" stroke="#f0c040" stroke-width="2" stroke-linecap="round"/>
  <!-- Bottom-right spoke -->
  <line x1="18.6" y1="17.5" x2="26.4" y2="22" stroke="#f0c040" stroke-width="2" stroke-linecap="round"/>
  <!-- Bottom-left spoke -->
  <line x1="13.4" y1="17.5" x2="5.6" y2="22" stroke="#f0c040" stroke-width="2" stroke-linecap="round"/>
</svg>
