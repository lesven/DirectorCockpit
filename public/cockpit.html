<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Director's Cockpit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="cockpit.css">
</head>
<body>

<header>
  <h1>Director's Cockpit</h1>
  <span class="kw-badge" id="kw-badge" title="Klicken zum Bearbeiten" data-action="editKW">KW —</span>
  <span class="save-indicator" id="save-ind" role="status" aria-live="polite">gespeichert</span>
</header>

<div id="loading-banner" class="loading-banner">Lade Daten…</div>

<main>

  <!-- TEAMS -->
  <section>
    <div class="section-header">
      <span class="section-label">Teams</span>
      <span class="section-count" id="teams-count"></span>
      <div class="section-line"></div>
      <button class="add-btn" data-action="addEntity" data-type="teams">+ Team</button>
    </div>
    <div class="teams-grid" id="teams-grid"></div>
  </section>

  <!-- INITIATIVEN -->
  <section>
    <div class="section-header">
      <span class="section-label">Initiativen &amp; Projekte</span>
      <span class="section-count" id="inis-count"></span>
      <div class="section-line"></div>
      <button class="add-btn" data-action="addEntity" data-type="initiatives">+ Initiative</button>
    </div>
    <div id="ini-filters">
      <input id="filter-name" type="text" placeholder="Projekt suchen…">
      <div class="filter-select-wrap">
        <select id="filter-team">
          <option value="">Alle Teams</option>
        </select>
      </div>
      <div class="filter-select-wrap">
        <select id="filter-status">
          <option value="">Alle Status</option>
          <option value="fertig">Fertig</option>
          <option value="yellow">In Arbeit</option>
          <option value="grey">Geplant</option>
          <option value="ungeplant">Ungeplant</option>
        </select>
      </div>
      <div class="filter-select-wrap">
        <select id="filter-projektstatus">
          <option value="">Projektstatus</option>
          <option value="ok">Alles gut</option>
          <option value="kritisch">Kritisch</option>
        </select>
      </div>
      <button id="filter-reset">✕ Reset</button>
    </div>
    <table class="ini-table">
      <thead>
        <tr>
          <th style="width:18%" class="sortable" data-action="sortInis" data-sort="name">Initiative / Projekt</th>
          <th style="width:12%" class="sortable" data-action="sortInis" data-sort="team">Team</th>
          <th style="width:11%" class="sortable" data-action="sortInis" data-sort="status">Status</th>
          <th style="width:10%" class="sortable" data-action="sortInis" data-sort="projektstatus">Projektstatus</th>
          <th style="width:7%" class="sortable" data-action="sortInis" data-sort="wsjf">WSJF</th>
          <th style="width:16%">Nächster Schritt</th>
          <th style="width:8%" class="sortable" data-action="sortInis" data-sort="frist">Frist</th>
          <th style="width:13%">Notiz</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="ini-body"></tbody>
    </table>
    <div id="ini-pagination" class="ini-pagination"></div>
  </section>

  <!-- NICHT VERGESSEN -->
  <section>
    <div class="section-header">
      <span class="section-label">Nicht vergessen</span>
      <span class="section-count" id="nv-count"></span>
      <div class="section-line"></div>
      <button class="add-btn" data-action="addEntity" data-type="nicht_vergessen">+ Eintrag</button>
    </div>
    <div class="nv-grid" id="nv-grid"></div>
  </section>

</main>

<!-- DETAIL-MODAL -->
<div class="modal-backdrop" id="detail-backdrop" hidden>
  <div class="modal" id="detail-modal" role="dialog" aria-modal="true" aria-labelledby="detail-title">
    <div class="modal-header">
      <h2 class="modal-title" id="detail-title">Initiative bearbeiten</h2>
      <button class="modal-close" id="detail-close" title="Schließen">✕</button>
    </div>
    <div class="modal-body" id="detail-body"></div>
  </div>
</div>

<!-- RISIKO-DETAILSEITE (ersetzt Cockpit-Ansicht) -->
<div id="risk-page" class="risk-page" hidden>
  <div class="risk-page-header-bar">
    <button class="risk-back-btn" id="risk-back">← Cockpit</button>
    <nav class="risk-breadcrumb">
      <span class="risk-breadcrumb-sep">›</span>
      <span class="risk-breadcrumb-ini" id="risk-page-ini-name"></span>
      <span class="risk-breadcrumb-sep">›</span>
      <span class="risk-breadcrumb-cur">Risiken</span>
    </nav>
    <span class="save-indicator" id="risk-save-ind" role="status" aria-live="polite">gespeichert</span>
  </div>

  <div class="risk-content">
    <div class="risk-ini-summary" id="risk-ini-summary"></div>

    <div class="risk-section-header">
      <span class="section-label">Risiken</span>
      <div class="section-line"></div>
      <button class="add-btn" id="risk-add">+ Risiko</button>
    </div>

    <div id="risk-list"></div>
  </div>
</div>

<script type="module" src="cockpit.js"></script>

<footer>
  <span class="footer-left">Director's Cockpit</span>
  <div class="footer-actions">
    <button class="footer-btn" data-action="importJSON">&#8599; Import JSON</button>
    <button class="footer-btn" data-action="exportJSON">&#8600; Export JSON</button>
  </div>
</footer>

</body>
</html>
