<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Director's Cockpit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="cockpit.css">
</head>
<body>

<header>
  <h1>Director's Cockpit</h1>
  <span class="kw-badge" id="kw-badge" title="Klicken zum Bearbeiten" data-action="editKW">KW —</span>
  <span class="save-indicator" id="save-ind">gespeichert</span>
</header>

<main>

  <!-- TEAMS -->
  <section>
    <div class="section-header">
      <span class="section-label">Teams</span>
      <div class="section-line"></div>
      <button class="add-btn" data-action="addTeam">+ Team</button>
    </div>
    <div class="teams-grid" id="teams-grid"></div>
  </section>

  <!-- INITIATIVEN -->
  <section>
    <div class="section-header">
      <span class="section-label">Initiativen &amp; Projekte</span>
      <div class="section-line"></div>
      <button class="add-btn" data-action="addIni">+ Initiative</button>
    </div>
    <table class="ini-table">
      <thead>
        <tr>
          <th style="width:20%" class="sortable" data-action="sortInis" data-sort="name">Initiative / Projekt</th>
          <th style="width:13%" class="sortable" data-action="sortInis" data-sort="team">Team</th>
          <th style="width:12%" class="sortable" data-action="sortInis" data-sort="status">Status</th>
          <th style="width:11%" class="sortable" data-action="sortInis" data-sort="projektstatus">Projektstatus</th>
          <th style="width:18%">Nächster Schritt</th>
          <th style="width:9%" class="sortable" data-action="sortInis" data-sort="frist">Frist</th>
          <th style="width:13%">Notiz</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="ini-body"></tbody>
    </table>
  </section>

  <!-- NICHT VERGESSEN -->
  <section>
    <div class="section-header">
      <span class="section-label">Nicht vergessen</span>
      <div class="section-line"></div>
      <button class="add-btn" data-action="addNV">+ Eintrag</button>
    </div>
    <div class="nv-grid" id="nv-grid"></div>
  </section>

</main>

<script src="cockpit.js"></script>

<footer>
  <span class="footer-left">Director's Cockpit</span>
  <div class="footer-actions">
    <button class="footer-btn" data-action="importJSON">&#8599; Import JSON</button>
    <button class="footer-btn" data-action="exportJSON">&#8600; Export JSON</button>
  </div>
</footer>

</body>
</html>
