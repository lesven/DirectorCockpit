<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Director's Cockpit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #171b26;
    --surface2: #1e2333;
    --border: #2a2f42;
    --border2: #363c54;
    --text: #e8eaf0;
    --text2: #8b90a7;
    --text3: #555b75;
    --accent: #4f8fff;
    --accent2: #2d5fc4;
    --green: #3ecf8e;
    --yellow: #f59e0b;
    --red: #ef4444;
    --grey: #555b75;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  header {
    padding: 24px 32px 0;
    display: flex;
    align-items: baseline;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
  }

  header h1 {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .kw-badge {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    background: rgba(79,143,255,0.1);
    border: 1px solid rgba(79,143,255,0.2);
    border-radius: 4px;
    padding: 2px 8px;
    cursor: pointer;
  }

  .kw-badge:hover { background: rgba(79,143,255,0.18); }

  .save-indicator {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .save-indicator.show { opacity: 1; }

  main {
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  /* ── Section headers ─────────────────────────────────────── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .add-btn {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .add-btn:hover {
    color: var(--accent);
    border-color: rgba(79,143,255,0.3);
  }

  /* ── Teams grid ──────────────────────────────────────────── */
  .teams-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  .team-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    position: relative;
    transition: border-color 0.15s;
  }

  .team-card:hover { border-color: var(--border2); }

  .team-card-top {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 10px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
    cursor: pointer;
    transition: transform 0.15s;
  }

  .status-dot:hover { transform: scale(1.4); }
  .status-green { background: var(--green); box-shadow: 0 0 6px rgba(62,207,142,0.4); }
  .status-yellow { background: var(--yellow); box-shadow: 0 0 6px rgba(245,158,11,0.4); }
  .status-red { background: var(--red); box-shadow: 0 0 6px rgba(239,68,68,0.4); }
  .status-grey { background: var(--grey); }

  .team-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    outline: none;
    border: none;
    background: transparent;
    width: 100%;
    font-family: var(--sans);
  }

  .team-name:focus { color: var(--accent); }

  .field-row {
    margin-top: 8px;
  }

  .field-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.06em;
    margin-bottom: 3px;
  }

  .field-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid transparent;
    border-radius: 6px;
    padding: 5px 8px;
    color: var(--text2);
    font-family: var(--sans);
    font-size: 13px;
    outline: none;
    resize: none;
    transition: border-color 0.15s, color 0.15s;
    line-height: 1.45;
  }

  .field-input:focus {
    border-color: rgba(79,143,255,0.3);
    color: var(--text);
  }

  .field-input::placeholder { color: var(--text3); }

  .card-actions {
    position: absolute;
    top: 10px;
    right: 10px;
    display: none;
    gap: 4px;
  }

  .team-card:hover .card-actions { display: flex; }

  .icon-btn {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 12px;
    padding: 2px 5px;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
  }

  .icon-btn:hover { color: var(--red); background: rgba(239,68,68,0.1); }
  .icon-btn.cycle:hover { color: var(--accent); background: rgba(79,143,255,0.1); }

  /* ── Initiatives table ──────────────────────────────────── */
  .ini-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
  }

  .ini-table th {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 400;
    padding: 6px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    user-select: none;
  }

  .ini-table th.sortable {
    cursor: pointer;
  }

  .ini-table th.sortable:hover { color: var(--text2); }

  .ini-table th.sort-asc::after  { content: ' ↑'; color: var(--accent); }
  .ini-table th.sort-desc::after { content: ' ↓'; color: var(--accent); }

  .ini-row { transition: background 0.1s; }
  .ini-row:hover { background: var(--surface); }

  .ini-row td {
    padding: 0;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  .ini-row td:last-child { width: 32px; }

  .ini-cell {
    display: block;
    width: 100%;
    padding: 9px 12px;
    background: transparent;
    border: none;
    color: var(--text2);
    font-family: var(--sans);
    font-size: 13px;
    outline: none;
    transition: color 0.15s;
  }

  .ini-cell:focus { color: var(--text); }
  .ini-cell::placeholder { color: var(--text3); }

  .ini-name { font-weight: 500; color: var(--text); }
  .ini-name:focus { color: var(--accent); }

  .ini-select {
    display: block;
    width: 100%;
    padding: 9px 10px;
    background: transparent;
    border: none;
    color: var(--text2);
    font-family: var(--sans);
    font-size: 12px;
    outline: none;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
  }

  .ini-select:focus { color: var(--text); }

  .ini-select option {
    background: #1e2333;
    color: var(--text);
  }

  .select-wrap {
    position: relative;
  }

  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 10px;
    pointer-events: none;
  }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-family: var(--mono);
    white-space: nowrap;
    border: 1px solid transparent;
    margin: 0;
  }

  .pill-green { background: rgba(62,207,142,0.1); color: var(--green); border-color: rgba(62,207,142,0.2); }
  .pill-yellow { background: rgba(245,158,11,0.1); color: var(--yellow); border-color: rgba(245,158,11,0.2); }
  .pill-red { background: rgba(239,68,68,0.1); color: var(--red); border-color: rgba(239,68,68,0.2); }
  .pill-grey { background: rgba(85,91,117,0.15); color: var(--text3); border-color: rgba(85,91,117,0.2); }

  .pill-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  .status-select-wrap {
    position: relative;
    padding: 6px 12px;
  }

  .status-select {
    appearance: none;
    -webkit-appearance: none;
    border: none;
    outline: none;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    padding: 3px 22px 3px 9px;
    border-radius: 20px;
    border: 1px solid transparent;
  }

  .status-select.s-fertig { background: rgba(62,207,142,0.1); color: var(--green); border-color: rgba(62,207,142,0.2); }
  .status-select.s-yellow { background: rgba(245,158,11,0.1); color: var(--yellow); border-color: rgba(245,158,11,0.2); }
  .status-select.s-grey { background: rgba(85,91,117,0.15); color: var(--text3); border-color: rgba(85,91,117,0.2); }
  .status-select.s-ungeplant { background: rgba(239,68,68,0.1); color: var(--red); border-color: rgba(239,68,68,0.2); }

  .status-select.ps-ok { background: rgba(62,207,142,0.08); color: var(--green); border-color: rgba(62,207,142,0.2); }
  .status-select.ps-kritisch { background: rgba(239,68,68,0.12); color: var(--red); border-color: rgba(239,68,68,0.3); font-weight: 500; }

  .status-select option { background: #1e2333; color: var(--text); }

  .status-select-wrap::after {
    content: '▾';
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 9px;
    pointer-events: none;
  }

  .status-select-wrap.s-fertig::after { color: var(--green); }
  .status-select-wrap.s-yellow::after { color: var(--yellow); }
  .status-select-wrap.s-red::after { color: var(--red); }
  .status-select-wrap.s-grey::after { color: var(--text3); }
  .status-select-wrap.s-ungeplant::after { color: var(--red); }
  .status-select-wrap.ps-ok::after { color: var(--green); }
  .status-select-wrap.ps-kritisch::after { color: var(--red); }

  .team-tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    background: rgba(79,143,255,0.08);
    color: var(--accent);
    border: 1px solid rgba(79,143,255,0.15);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }

  .ini-notiz {
    resize: none;
    overflow: hidden;
    line-height: 1.45;
    min-height: 36px;
  }

  .del-row-btn {
    background: none;
    border: none;
    color: var(--red);
    opacity: 0.35;
    cursor: pointer;
    font-size: 14px;
    padding: 4px 8px;
    transition: opacity 0.15s;
  }

  .ini-row:hover .del-row-btn { opacity: 1; }

  /* ── Nicht vergessen ──────────────────────────────────────── */
  .nv-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 10px;
  }

  .nv-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 2px solid var(--yellow);
    border-radius: 8px;
    padding: 12px;
    position: relative;
  }

  .nv-card:hover .card-actions { display: flex; }

  .nv-title {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    outline: none;
    margin-bottom: 6px;
  }

  .nv-title:focus { color: var(--accent); }
  .nv-title::placeholder { color: var(--text3); }

  .nv-body {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text2);
    font-family: var(--sans);
    font-size: 12px;
    outline: none;
    resize: none;
    line-height: 1.5;
  }

  .nv-body:focus { color: var(--text); }
  .nv-body::placeholder { color: var(--text3); }

  /* ── Status cycle tooltip ────────────────────────────────── */
  .status-hint {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    margin-top: 10px;
    text-align: right;
  }

  @media (max-width: 700px) {
    main { padding: 16px; }
    header { padding: 16px 16px 12px; }
    .teams-grid { grid-template-columns: 1fr; }
    .ini-table th:nth-child(3),
    .ini-table td:nth-child(3),
    .ini-table th:nth-child(4),
    .ini-table td:nth-child(4) { display: none; }
  }

  footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 32px;
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }

  .footer-left {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .footer-actions {
    display: flex;
    gap: 8px;
  }

  .footer-btn {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .footer-btn:hover {
    color: var(--accent);
    border-color: rgba(79,143,255,0.3);
    background: rgba(79,143,255,0.05);
  }
</style>
</head>
<body>

<header>
  <h1>Director's Cockpit</h1>
  <span class="kw-badge" id="kw-badge" title="Klicken zum Bearbeiten">KW —</span>
  <span class="save-indicator" id="save-ind">gespeichert</span>
</header>

<main>

  <!-- TEAMS -->
  <section>
    <div class="section-header">
      <span class="section-label">Teams</span>
      <div class="section-line"></div>
      <button class="add-btn" onclick="addTeam()">+ Team</button>
    </div>
    <div class="teams-grid" id="teams-grid"></div>
  </section>

  <!-- INITIATIVEN -->
  <section>
    <div class="section-header">
      <span class="section-label">Initiativen &amp; Projekte</span>
      <div class="section-line"></div>
      <button class="add-btn" onclick="addIni()">+ Initiative</button>
    </div>
    <table class="ini-table">
      <thead>
        <tr>
          <th style="width:20%" class="sortable" onclick="sortInis('name')">Initiative / Projekt</th>
          <th style="width:13%" class="sortable" onclick="sortInis('team')">Team</th>
          <th style="width:12%" class="sortable" onclick="sortInis('status')">Status</th>
          <th style="width:11%" class="sortable" onclick="sortInis('projektstatus')">Projektstatus</th>
          <th style="width:18%">Nächster Schritt</th>
          <th style="width:9%" class="sortable" onclick="sortInis('frist')">Frist</th>
          <th style="width:13%">Notiz</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="ini-body"></tbody>
    </table>
  </section>

  <!-- NICHT VERGESSEN -->
  <section>
    <div class="section-header">
      <span class="section-label">Nicht vergessen</span>
      <div class="section-line"></div>
      <button class="add-btn" onclick="addNV()">+ Eintrag</button>
    </div>
    <div class="nv-grid" id="nv-grid"></div>
  </section>

</main>

<script>
const STATUSES = ['fertig','yellow','grey','ungeplant'];
const STATUS_LABELS = { fertig:'Fertig', yellow:'In Arbeit', grey:'Geplant', ungeplant:'Ungeplant' };

const defaultData = {
  kw: '',
  teams: [
    { id:1, name:'IT Service', sub:'Endgeräte & User', status:'green', fokus:'', schritt:'' },
    { id:2, name:'IT Infrastruktur', sub:'RZ, Netzwerk, Betrieb', status:'green', fokus:'', schritt:'' },
    { id:3, name:'DevOps', sub:'K8s, GitLab, Azure DevOps', status:'yellow', fokus:'', schritt:'' },
    { id:4, name:'Konzernapplikationen', sub:'Navision, MSSQL, CRM', status:'green', fokus:'', schritt:'' },
  ],
  inis: [
    { id:1, name:'Update Azure DevOps', team:3, status:'yellow', schritt:'Versionsplanung abschließen', frist:'', notiz:'' },
    { id:2, name:'Update GitLab', team:3, status:'yellow', schritt:'Upgrade-Pfad definieren', frist:'', notiz:'' },
    { id:3, name:'Onboarding SVA Fortinet', team:2, status:'green', schritt:'Kick-off durchführen', frist:'', notiz:'' },
    { id:4, name:'Onboarding SVA MSSQL', team:4, status:'green', schritt:'Anforderungen & SLA klären', frist:'', notiz:'' },
  ],
  nvs: []
};

let data;
let saveTimer;

function load() {
  try {
    const raw = localStorage.getItem('directors_cockpit_v2');
    data = raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(defaultData));
  } catch(e) {
    data = JSON.parse(JSON.stringify(defaultData));
  }
}

function save() {
  localStorage.setItem('directors_cockpit_v2', JSON.stringify(data));
  const ind = document.getElementById('save-ind');
  ind.classList.add('show');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => ind.classList.remove('show'), 1400);
}

function debounce(fn, ms=400) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

const dSave = debounce(save);

/* ── KW badge ───────────────────────────────────────────────── */
function renderKW() {
  const el = document.getElementById('kw-badge');
  el.textContent = data.kw ? 'KW ' + data.kw : 'KW —';
  el.onclick = () => {
    const v = prompt('Kalenderwoche:', data.kw || '');
    if (v !== null) { data.kw = v.trim(); save(); renderKW(); }
  };
}

/* ── Teams ──────────────────────────────────────────────────── */
function statusClass(s) {
  return 'status-' + (s || 'grey');
}

function cycleStatus(id, isTeam) {
  const arr = isTeam ? data.teams : data.inis;
  const item = arr.find(x => x.id === id);
  if (!item) return;
  const idx = STATUSES.indexOf(item.status);
  item.status = STATUSES[(idx + 1) % STATUSES.length];
  save();
  isTeam ? renderTeams() : renderInis();
}

function renderTeams() {
  const grid = document.getElementById('teams-grid');
  grid.innerHTML = '';
  data.teams.forEach(t => {
    const card = document.createElement('div');
    card.className = 'team-card';
    card.innerHTML = `
      <div class="team-card-top">
        <div class="status-dot ${statusClass(t.status)}" title="Status wechseln: ${STATUS_LABELS[t.status]}" onclick="cycleStatus(${t.id},true)"></div>
        <input class="team-name" value="${esc(t.name)}" placeholder="Teamname" data-id="${t.id}" data-field="name">
      </div>
      <div class="card-actions">
        <button class="icon-btn" onclick="removeTeam(${t.id})" title="Löschen">✕</button>
      </div>
      <div class="field-row">
        <div class="field-label">Thema</div>
        <input class="field-input" value="${esc(t.sub)}" placeholder="Kurzbeschreibung" data-id="${t.id}" data-field="sub">
      </div>
      <div class="field-row">
        <div class="field-label">Aktueller Fokus</div>
        <textarea class="field-input" rows="2" placeholder="Was läuft gerade?" data-id="${t.id}" data-field="fokus">${esc(t.fokus)}</textarea>
      </div>
      <div class="field-row">
        <div class="field-label">Mein nächster Schritt</div>
        <input class="field-input" value="${esc(t.schritt)}" placeholder="Was muss ich tun?" data-id="${t.id}" data-field="schritt">
      </div>
    `;
    grid.appendChild(card);
  });

  grid.querySelectorAll('[data-id]').forEach(el => {
    el.addEventListener('input', e => {
      const id = +e.target.dataset.id;
      const field = e.target.dataset.field;
      const team = data.teams.find(x => x.id === id);
      if (team) { team[field] = e.target.value; dSave(); }
    });
  });
}

function addTeam() {
  const id = Date.now();
  data.teams.push({ id, name:'Neues Team', sub:'', status:'grey', fokus:'', schritt:'' });
  save(); renderTeams();
}

function removeTeam(id) {
  const team = data.teams.find(x => x.id === id);
  const name = team && team.name ? `„${team.name}"` : 'dieses Team';
  if (!confirm(`${name} wirklich löschen?`)) return;
  data.teams = data.teams.filter(x => x.id !== id);
  save(); renderTeams();
}

const STATUS_ORDER = { fertig:0, yellow:1, grey:2, ungeplant:3 };

let sortState = { field: null, dir: 'asc' };

function sortInis(field) {
  if (sortState.field === field) {
    sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
  } else {
    sortState.field = field;
    sortState.dir = 'asc';
  }
  renderInis();
}

function getSortedInis() {
  if (!sortState.field) return [...data.inis];
  const { field, dir } = sortState;
  return [...data.inis].sort((a, b) => {
    let va, vb;
    if (field === 'team') {
      const ta = data.teams.find(t => t.id === a.team);
      const tb = data.teams.find(t => t.id === b.team);
      va = ta ? ta.name.toLowerCase() : 'zzz';
      vb = tb ? tb.name.toLowerCase() : 'zzz';
    } else if (field === 'projektstatus') {
      const PS_ORDER = { ok:0, kritisch:1 };
      va = PS_ORDER[a.projektstatus] ?? 9;
      vb = PS_ORDER[b.projektstatus] ?? 9;
    } else if (field === 'status') {
      va = STATUS_ORDER[a.status] ?? 9;
      vb = STATUS_ORDER[b.status] ?? 9;
    } else if (field === 'frist') {
      va = a.frist || 'zzz';
      vb = b.frist || 'zzz';
    } else {
      va = (a[field] || '').toLowerCase();
      vb = (b[field] || '').toLowerCase();
    }
    if (va < vb) return dir === 'asc' ? -1 : 1;
    if (va > vb) return dir === 'asc' ? 1 : -1;
    return 0;
  });
}

function updateSortHeaders() {
  document.querySelectorAll('.ini-table th.sortable').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    const field = th.getAttribute('onclick')?.match(/sortInis\('(\w+)'\)/)?.[1];
    if (field === sortState.field) {
      th.classList.add(sortState.dir === 'asc' ? 'sort-asc' : 'sort-desc');
    }
  });
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

/* ── Initiativen ────────────────────────────────────────────── */
function teamOptions(selectedId) {
  const none = `<option value=""${!selectedId ? ' selected' : ''}>—</option>`;
  const opts = data.teams.map(t =>
    `<option value="${t.id}"${t.id === selectedId ? ' selected' : ''}>${esc(t.name)}</option>`
  ).join('');
  return none + opts;
}

function renderInis() {
  const tbody = document.getElementById('ini-body');
  tbody.innerHTML = '';
  updateSortHeaders();
  getSortedInis().forEach(ini => {
    const s = ini.status || 'grey';
    const ps = ini.projektstatus || 'ok';
    const tr = document.createElement('tr');
    tr.className = 'ini-row';
    tr.innerHTML = `
      <td><input class="ini-cell ini-name" value="${esc(ini.name)}" placeholder="Projektname" data-id="${ini.id}" data-field="name"></td>
      <td>
        <div class="select-wrap">
          <select class="ini-select" data-id="${ini.id}" data-field="team">
            ${teamOptions(ini.team)}
          </select>
        </div>
      </td>
      <td>
        <div class="status-select-wrap s-${s}">
          <select class="status-select s-${s}" data-id="${ini.id}" data-field="status">
            <option value="fertig"${s==='fertig'?' selected':''}>Fertig</option>
            <option value="yellow"${s==='yellow'?' selected':''}>In Arbeit</option>
            <option value="grey"${s==='grey'?' selected':''}>Geplant</option>
            <option value="ungeplant"${s==='ungeplant'?' selected':''}>Ungeplant</option>
          </select>
        </div>
      </td>
      <td>
        <div class="status-select-wrap ps-${ps}">
          <select class="status-select ps-select ps-${ps}" data-id="${ini.id}" data-field="projektstatus">
            <option value="ok"${ps==='ok'?' selected':''}>Alles gut</option>
            <option value="kritisch"${ps==='kritisch'?' selected':''}>Kritisch</option>
          </select>
        </div>
      </td>
      <td><input class="ini-cell" value="${esc(ini.schritt)}" placeholder="Nächster Schritt" data-id="${ini.id}" data-field="schritt"></td>
      <td><input class="ini-cell" value="${esc(ini.frist)}" placeholder="TT.MM" data-id="${ini.id}" data-field="frist"></td>
      <td><textarea class="ini-cell ini-notiz" placeholder="Notiz" data-id="${ini.id}" data-field="notiz" rows="1">${esc(ini.notiz)}</textarea></td>
      <td><button class="del-row-btn" onclick="removeIni(${ini.id})" title="Löschen">✕</button></td>
    `;
    tbody.appendChild(tr);
  });

  tbody.querySelectorAll('.ini-notiz').forEach(autoGrow);

  tbody.querySelectorAll('[data-id]').forEach(el => {
    const evt = el.tagName === 'SELECT' ? 'change' : 'input';
    el.addEventListener(evt, e => {
      if (e.target.classList.contains('ini-notiz')) autoGrow(e.target);
      const id = +e.target.dataset.id;
      const field = e.target.dataset.field;
      const ini = data.inis.find(x => x.id === id);
      if (!ini) return;
      ini[field] = field === 'team' ? (e.target.value ? +e.target.value : null) : e.target.value;
      if (field === 'status' || field === 'projektstatus') renderInis();
      else dSave();
      if (field === 'status' || field === 'projektstatus') save();
    });
  });
}

function addIni() {
  const id = Date.now();
  data.inis.push({ id, name:'', team: null, status:'grey', projektstatus:'ok', schritt:'', frist:'', notiz:'' });
  save(); renderInis();
  setTimeout(() => {
    const inputs = document.querySelectorAll('.ini-name');
    if (inputs.length) inputs[inputs.length-1].focus();
  }, 50);
}

function removeIni(id) {
  const ini = data.inis.find(x => x.id === id);
  const name = ini && ini.name ? `„${ini.name}"` : 'diese Initiative';
  if (!confirm(`${name} wirklich löschen?`)) return;
  data.inis = data.inis.filter(x => x.id !== id);
  save(); renderInis();
}

/* ── Nicht vergessen ─────────────────────────────────────────── */
function renderNVs() {
  const grid = document.getElementById('nv-grid');
  grid.innerHTML = '';
  data.nvs.forEach(nv => {
    const card = document.createElement('div');
    card.className = 'nv-card';
    card.innerHTML = `
      <div class="card-actions">
        <button class="icon-btn" onclick="removeNV(${nv.id})" title="Löschen">✕</button>
      </div>
      <input class="nv-title" value="${esc(nv.title)}" placeholder="Thema" data-id="${nv.id}" data-field="title">
      <textarea class="nv-body" rows="3" placeholder="Warum wichtig / nächste Aktion..." data-id="${nv.id}" data-field="body">${esc(nv.body)}</textarea>
    `;
    grid.appendChild(card);
  });

  grid.querySelectorAll('[data-id]').forEach(el => {
    el.addEventListener('input', e => {
      const id = +e.target.dataset.id;
      const field = e.target.dataset.field;
      const nv = data.nvs.find(x => x.id === id);
      if (nv) { nv[field] = e.target.value; dSave(); }
    });
  });
}

function addNV() {
  const id = Date.now();
  data.nvs.push({ id, title:'', body:'' });
  save(); renderNVs();
  setTimeout(() => {
    const inputs = document.querySelectorAll('.nv-title');
    if (inputs.length) inputs[inputs.length-1].focus();
  }, 50);
}

function removeNV(id) {
  const nv = data.nvs.find(x => x.id === id);
  const name = nv && nv.title ? `„${nv.title}"` : 'diesen Eintrag';
  if (!confirm(`${name} wirklich löschen?`)) return;
  data.nvs = data.nvs.filter(x => x.id !== id);
  save(); renderNVs();
}

/* ── Utils ──────────────────────────────────────────────────── */
function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Export ─────────────────────────────────────────────────── */
function exportJSON() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const kw = data.kw ? `_KW${data.kw}` : '';
  a.href = url;
  a.download = `cockpit${kw}_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

/* ── Import ─────────────────────────────────────────────────── */
function migrateData(parsed) {
  if (!Array.isArray(parsed.teams)) parsed.teams = [];
  if (!Array.isArray(parsed.inis))  parsed.inis  = [];
  if (!Array.isArray(parsed.nvs))   parsed.nvs   = [];
  if (!parsed.kw) parsed.kw = '';

  parsed.teams = parsed.teams.map(t => ({
    id:      t.id      ?? Date.now(),
    name:    t.name    ?? '',
    sub:     t.sub     ?? '',
    status:  t.status  ?? 'grey',
    fokus:   t.fokus   ?? '',
    schritt: t.schritt ?? '',
  }));

  const validStatus = ['fertig','yellow','grey','ungeplant'];
  parsed.inis = parsed.inis.map(i => ({
    id:             i.id             ?? Date.now(),
    name:           i.name           ?? '',
    team:           i.team           ?? null,
    status:         validStatus.includes(i.status) ? i.status : 'grey',
    projektstatus:  i.projektstatus  ?? 'ok',
    schritt:        i.schritt        ?? '',
    frist:          i.frist          ?? '',
    notiz:          i.notiz          ?? '',
  }));

  parsed.nvs = parsed.nvs.map(n => ({
    id:    n.id    ?? Date.now(),
    title: n.title ?? '',
    body:  n.body  ?? '',
  }));

  return parsed;
}

function importJSON() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/json,.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (typeof parsed !== 'object' || parsed === null) throw new Error('Ungültiges Format');
        const migrated = migrateData(parsed);
        const summary = `${migrated.teams.length} Teams, ${migrated.inis.length} Initiativen, ${migrated.nvs.length} Nicht-vergessen-Einträge`;
        if (!confirm(`Daten aus „${file.name}" importieren?\n(${summary})\n\nAktuelle Daten werden überschrieben.`)) return;
        data = migrated;
        save();
        renderKW();
        renderTeams();
        renderInis();
        renderNVs();
      } catch(err) {
        alert('Import fehlgeschlagen: ' + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

/* ── Init ───────────────────────────────────────────────────── */
load();
renderKW();
renderTeams();
renderInis();
renderNVs();
</script>

<footer>
  <span class="footer-left">Director's Cockpit</span>
  <div class="footer-actions">
    <button class="footer-btn" onclick="importJSON()">&#8599; Import JSON</button>
    <button class="footer-btn" onclick="exportJSON()">&#8600; Export JSON</button>
  </div>
</footer>

</body>
</html>
